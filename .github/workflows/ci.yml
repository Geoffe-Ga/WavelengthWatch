name: CI

on:
  # Run on direct pushes to main and on every PR. Restricting push to main
  # (rather than "**") stops PR branches from spawning a duplicate run for the
  # same commit — one via push, one via pull_request — which doubled cost and
  # flake exposure and produced an ambiguous mixed check status.
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

# Cancel superseded runs for the same ref so rapid pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit (lint, type, security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  backend:
    name: Backend (FastAPI) - lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi

      - name: Lint & Type-check
        run: |
          source .venv/bin/activate
          ruff check --config ruff.toml backend tests
          mypy --config-file mypy.ini backend

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -q

  frontend:
    name: Frontend (watchOS) - format & build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Prefer Xcode 26.x so the build sees the watchOS 26 SDK and the
          # `if #available(watchOS 26, *)` Liquid Glass gates resolve against
          # real symbols. Fall back to Xcode 16.x if 26 is unavailable on the
          # runner image — the project's deployment target (watchOS 11) and
          # Swift 5 mode keep both toolchains buildable for now.
          # GitHub runners use versioned names (Xcode_26.3.app, Xcode_16.4.app, etc.)
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          XCODE_16=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_26" ]; then
            echo "Selected: $XCODE_26"
            sudo xcode-select -s "$XCODE_26/Contents/Developer"
          elif [ -n "$XCODE_16" ]; then
            echo "Falling back to: $XCODE_16"
            sudo xcode-select -s "$XCODE_16/Contents/Developer"
          else
            echo "No Xcode 26.x or 16.x found. Available installations:"
            ls /Applications/Xcode*.app 2>/dev/null || echo "  (none)"
            exit 1
          fi

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: SwiftFormat check
        run: swiftformat --lint frontend

      - name: Build and test watchOS app
        timeout-minutes: 35
        run: |
          cd frontend/WavelengthWatch
          # The watchOS simulator intermittently refuses to launch the app with
          # "Application has termination assertions" (FBSOpenApplicationServiceErrorDomain),
          # an infrastructure flake unrelated to the build. Reset simulator state
          # and retry once before declaring failure.
          for attempt in 1 2; do
            echo "::group::watchOS test attempt $attempt"
            xcrun simctl shutdown all || true
            xcrun simctl erase all || true
            if ./run-tests-individually.sh; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; resetting simulator and retrying."
          done
          echo "watchOS tests failed after 2 attempts."
          exit 1
